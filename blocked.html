<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Get Back To Work!</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --primary: #4f46e5;
      --text-main: #111827;
      --text-muted: #6b7280;
      --surface: #ffffff;
    }
    
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: var(--bg);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      text-align: center;
      padding: 20px;
    }

    .container {
      background: var(--surface);
      padding: 50px 40px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      max-width: 500px;
      width: 100%;
      border-top: 6px solid var(--primary);
    }

    .icon { 
      width: 80px; 
      height: 80px; 
      margin-bottom: 20px; 
      object-fit: contain;
      animation: pulse 2s infinite ease-in-out; 
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    h1 { 
      font-size: 2.2rem; 
      margin: 0 0 10px 0; 
      font-weight: 800; 
      color: var(--text-main); 
      letter-spacing: -0.5px; 
    }

    p { 
      font-size: 1.1rem; 
      margin: 0 0 10px 0; 
      color: var(--text-muted); 
      line-height: 1.5; 
    }

    .highlight { 
      color: var(--primary); 
      font-weight: 700; 
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="icon.png" class="icon" alt="Focus Blocker Logo">
    <h1>Focus Mode Active</h1>
    <p>The Distracted Website Has Been Eaten</p>
    <p>LOCK IN! <span class="highlight">Get back to work!</span></p>
  </div>
</body>
</html>
